<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री बालाजी सायबर पॉईंट - स्मार्ट ऑटो प्रिंट</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 🔤 अक्षरे विखुरू नयेत म्हणून कडक सिस्टम फॉन्ट सेटिंग */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid #002d62; }
        h1 { color: #002d62; margin-bottom: 5px; font-size: 24px; font-weight: bold; }
        h2 { color: #b8860b; margin-top: 0; font-size: 17px; margin-bottom: 20px; font-weight: bold; }
        .section { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; border: 1px solid #eef0f2; }
        .section-title { font-weight: bold; color: #002d62; margin-bottom: 10px; display: block; font-size: 15px; }
        label { display: inline-block; margin-right: 15px; cursor: pointer; font-weight: bold; font-size: 14px; }
        input[type="radio"], input[type="checkbox"] { margin-right: 5px; transform: scale(1.1); }
        .file-input-group { margin-top: 10px; }
        input[type="file"] { width: 100%; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .hidden { display: none; }
        button { width: 100%; background: #002d62; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #b8860b; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 90%; width: 350px; text-align: center; box-shadow: 0 5px 25px rgba(0,0,0,0.3); }
        #qrcode { margin: 15px auto; padding: 10px; background: white; display: inline-block; border: 4px solid #002d62; border-radius: 10px; }
        .amt-text { font-size: 22px; font-weight: bold; color: #d32f2f; margin: 10px 0; }
        .success-btn { background: #2e7d32; color: white; margin-top: 15px; padding: 12px; font-size: 16px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .success-btn:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 श्री बालाजी सायबर पॉईंट 👑</h1>
    <h2>स्मार्ट मोबाईल ऑटो प्रिंट सिस्टीम</h2>

    <form id="uploadForm">
        <div class="section" onclick="calculatePrice()">
            <span class="section-title">🎨 प्रिंटचा प्रकार निवडा:</span>
            <label><input type="radio" name="printMode" value="color" checked> कलर (Color)</label>
            <label><input type="radio" name="printMode" value="bw"> | ब्लॅक अँड व्हाईट (B&W)</label>
        </div>

        <div class="section" onclick="toggleJobType()">
            <span class="section-title">📄 डॉक्युमेंटचा प्रकार:</span>
            <label><input type="radio" name="jobType" value="normal" checked> Normal (फोटो / PDF)</label>
            <label><input type="radio" name="jobType" value="id_card"> आयडी कार्ड (Front & Back)</label>
